<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boomer</title>
</head>
<body>
    <style>
        /* Modern Tech Canvas with Grid Overlay */
        body {
            display: grid;
            place-items: center;
            height: 100vh;
            margin: 0;
            background-color: #0b0f19;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            background-size: 24px 24px, 24px 24px, 100% 100%;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        /* Glassmorphic Dark Card with Glow Border */
        .card {
            width: 90%;
            max-width: 380px;
            padding: 40px 32px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 28px;
            position: relative;
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.4),
                0 25px 50px -12px rgba(0, 0, 0, 0.6),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
            
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Ambient Glow Behind the Card */
        .card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.3), rgba(5, 150, 105, 0.05));
            border-radius: 30px;
            z-index: -1;
        }

        /* Pulsing Icon Container */
        .icon-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 68px;
            height: 68px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.25);
            border-radius: 50%;
            margin-bottom: 24px;
            color: #34d399;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
            animation: pulseGlow 3s infinite ease-in-out;
        }
        
        /* Balanced Typography */
        .card-title {
            color: #f8fafc;
            font-size: 24px;
            font-weight: 600;
            line-height: 1.3;
            letter-spacing: -0.02em;
            margin: 0 0 10px 0;
        }

        .card-description {
            color: #94a3b8;
            font-size: 14.5px;
            font-weight: 400;
            line-height: 1.6;
            margin: 0 0 36px 0;
        }

        /* High-End Emerald Action Button with Shimmer Overlay */
        .btn-proceed {
            width: 100%;
            position: relative;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.01em;
            border: none;
            outline: none;
            padding: 16px;
            border-radius: 14px;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.35);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Animated Pure CSS Shine Element */
        .btn-proceed::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 30%;
            height: 200%;
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.3) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(25deg);
            transition: all 0.6s ease;
        }

        /* Micro-Interactions & Hover Triggers */
        .btn-proceed:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(16, 185, 129, 0.5);
        }

        /* Trigger Shine Sweep On Hover */
        .btn-proceed:hover::after {
            left: 130%;
            transition: all 0.6s ease-in-out;
        }

        .btn-proceed:active {
            transform: translateY(1px);
            box-shadow: 0 3px 8px rgba(16, 185, 129, 0.4);
        }

        /* Core Animation Keyframes */
        @keyframes pulseGlow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
                border-color: rgba(16, 185, 129, 0.25);
            }
            50% {
                box-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
                border-color: rgba(16, 185, 129, 0.5);
            }
        }
        
        /* FIXED: Force link wrapper to span the full width of the layout container */
        a {
            text-decoration: none;
            width: 100%;
            display: block;
        }
    </style>

    <div class="card">
        <div class="icon-container">
            <svg xmlns="http://w3.org" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        </div>
        <h2 class="card-title">Ready to Proceed?</h2>
        <p class="card-description">Please press the button below to continue your journey.</p>
        <a href="whatsapp sender frontend2.html"><button class="btn-proceed">Proceed </button></a>
    </div>
</body>
</html>
